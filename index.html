<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Online Web Editor — онлайн-редактор HTML, CSS и JavaScript с живым предпросмотром">
  <meta name="theme-color" content="#0a0a12">
  <title>Online Web Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
  <div class="app" id="app">
    <header class="header">
      <div class="header__brand">
        <div class="logo" aria-hidden="true">
          <span class="logo__bracket">&lt;</span>
          <span class="logo__core">Online Web Editor</span>
          <span class="logo__bracket">/&gt;</span>
        </div>
        <p class="header__tagline">HTML · CSS · JavaScript</p>
      </div>

      <div class="header__actions">
        <button type="button" class="btn btn--ghost" id="btn-reset" title="Сбросить к шаблону">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46A7.93 7.93 0 0 0 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74A7.93 7.93 0 0 0 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z" fill="currentColor"/></svg>
          <span class="btn__label">Сброс</span>
        </button>
        <button type="button" class="btn btn--ghost" id="btn-download" title="Скачать HTML-файл">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z" fill="currentColor"/></svg>
          <span class="btn__label">Скачать</span>
        </button>
        <button type="button" class="btn btn--primary" id="btn-run" title="Обновить предпросмотр (Ctrl+Enter)">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
          <span class="btn__label">Запуск</span>
        </button>
      </div>
    </header>

    <div class="workspace">
      <section class="panel panel--editor" id="editor-panel" aria-label="Редактор кода">
        <div class="panel__toolbar">
          <div class="tabs" role="tablist" aria-label="Языки">
            <button type="button" class="tab tab--active" role="tab" aria-selected="true" data-lang="html" id="tab-html">
              <span class="tab__dot tab__dot--html"></span>
              HTML
            </button>
            <button type="button" class="tab" role="tab" aria-selected="false" data-lang="css" id="tab-css">
              <span class="tab__dot tab__dot--css"></span>
              CSS
            </button>
            <button type="button" class="tab" role="tab" aria-selected="false" data-lang="javascript" id="tab-js">
              <span class="tab__dot tab__dot--js"></span>
              JavaScript
            </button>
          </div>
          <label class="toggle" title="Автообновление предпросмотра">
            <input type="checkbox" id="auto-run" checked>
            <span class="toggle__track"><span class="toggle__thumb"></span></span>
            <span class="toggle__label">Live</span>
          </label>
        </div>

        <div class="editors">
          <div class="editor-wrap editor-wrap--active" data-lang="html">
            <div id="editor-html" class="ace-editor" aria-label="HTML редактор"></div>
          </div>
          <div class="editor-wrap" data-lang="css">
            <div id="editor-css" class="ace-editor" aria-label="CSS редактор"></div>
          </div>
          <div class="editor-wrap" data-lang="javascript">
            <div id="editor-js" class="ace-editor" aria-label="JavaScript редактор"></div>
          </div>
        </div>

        <footer class="panel__status">
          <span id="status-lang">HTML</span>
          <span class="status-sep">·</span>
          <span id="status-position">Ln 1, Col 1</span>
          <span class="status-sep">·</span>
          <span id="status-saved" class="status-saved">Сохранено локально</span>
        </footer>
      </section>

      <div class="resizer" id="resizer" role="separator" aria-orientation="vertical" aria-label="Изменить размер панелей" tabindex="0"></div>

      <section class="panel panel--preview" id="preview-panel" aria-label="Предпросмотр">
        <div class="panel__toolbar panel__toolbar--preview">
          <div class="preview-label">
            <span class="preview-label__dot"></span>
            Предпросмотр
          </div>
          <div class="preview-actions">
            <button type="button" class="icon-btn" id="btn-refresh" title="Обновить">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08a5.99 5.99 0 0 1-5.65 4c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" fill="currentColor"/></svg>
            </button>
            <button type="button" class="icon-btn" id="btn-fullscreen" title="Полный экран предпросмотра">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z" fill="currentColor"/></svg>
            </button>
          </div>
        </div>
        <div class="preview-frame-wrap">
          <iframe id="preview" title="Результат выполнения кода" sandbox="allow-scripts allow-modals allow-forms allow-popups"></iframe>
        </div>
      </section>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.9/ace.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.9/ext-language_tools.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="assets/js/app.js" defer></script>
</body>
</html>
